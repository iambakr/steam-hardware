                                return [catHtml, `${v.m3.toFixed(2)}%`, `${v.m4.toFixed(2)}%`, shHtml, fmtChange(v.mom)];
                        });
                        const vramTable = renderTable([t("th_cat"), t("th_m3"), t("th_m4"), t("th_m5"), t("th_change")], vramRows);

                        const dispRows = D.display.map(d => {
                                const isHighlight = d.cat.includes("1440p");
                                return [d.cat, `${d.m3.toFixed(2)}%`, `${d.m4.toFixed(2)}%`, `${d.m5.toFixed(2)}%`, fmtChange(d.mom)];
                        });
                        const dispTable = renderTable([t("th_cat"), t("th_m3"), t("th_m4"), t("th_m5"), t("th_change")], dispRows);

                        S.push(slide("p4", `
        <div class="cols2">
          <div class="col">
            <h3>${t("h3_vram")}</h3>
            <div class="scrollwrap" style="max-height: 380px;">
              ${vramTable}
            </div>
          </div>
          <div class="col">
            <h3>${t("h3_disp")}</h3>
            <div class="scrollwrap" style="max-height: 380px;">
              ${dispTable}
            </div>
          </div>
        </div>
      `, "p4_ins"));

                        // Slide 7: Part 5 - Storage Space (Total & Free)
                        const totalHdRows = D.totalHd.map(h => {
                                const isHighlight = h.cat === "Above 1 TB";
                                const catHtml = isHighlight ? `<span class="win">${h.cat}</span>` : h.cat;
                                const shHtml = isHighlight ? `<span class="win">${h.m5.toFixed(2)}%</span>` : `${h.m5.toFixed(2)}%`;
                                return [catHtml, `${h.m3.toFixed(2)}%`, `${h.m4.toFixed(2)}%`, shHtml, fmtChange(h.mom)];
                        });
                        const totalHdTable = renderTable([t("th_cat"), t("th_m3"), t("th_m4"), t("th_m5"), t("th_change")], totalHdRows);

                        const freeHdRows = D.freeHd.map(f => {
                                const cleanedCat = f.cat.replace(" (Free)", "");
                                const isHighlight = cleanedCat.includes("10 GB to 99 GB") || cleanedCat.includes("Less than 10 GB");
                                const catHtml = isHighlight ? `<span style="color:var(--red);font-weight:700">${cleanedCat}</span>` : cleanedCat;
                                return [catHtml, `${f.m3.toFixed(2)}%`, `${f.m4.toFixed(2)}%`, `${f.m5.toFixed(2)}%`, fmtChange(f.mom)];
                        });
                        const freeHdTable = renderTable([t("th_cat"), t("th_m3"), t("th_m4"), t("th_m5"), t("th_change")], freeHdRows);

                        S.push(slide("p5", `
        <div class="cols2">
          <div class="col">
            <h3>${t("h3_total")}</h3>
            <div class="scrollwrap" style="max-height: 380px;">
              ${totalHdTable}
            </div>
          </div>
          <div class="col">
            <h3>${t("h3_free")}</h3>
            <div class="scrollwrap" style="max-height: 380px;">
              ${freeHdTable}
            </div>
          </div>
        </div>
      `, "p5_ins"));

                        // Slide 7c: Storage Divergence by Tier
                        {
                                const fHd = D.freeHdTrend, tHd = D.totalHdTrend;
                                const fsv = name => { const s = fHd.series.find(x => x.name === name); return s ? s.vals : tHd.dates.map(() => 0); };
                                const tsv = name => { const s = tHd.series.find(x => x.name === name); return s ? s.vals : tHd.dates.map(() => 0); };
                                const f1t2 = fsv("1 TB to 2 TB"), f2t3 = fsv("2 TB to 3 TB"), f3t4 = fsv("3 TB to 4 TB"), fA4 = fsv("Above 4 TB");
                                const fAbove1TB = tHd.dates.map((_, i) => +(f1t2[i] + f2t3[i] + f3t4[i] + fA4[i]).toFixed(2));
                                const TIER_D = [
                                        { name: "Above 1 TB", color: "#E15759", f: fAbove1TB, t: tsv("Above 1 TB") },
                                        { name: "750 GB to 999 GB", color: "#4E79A7", f: fsv("750 GB to 999 GB"), t: tsv("750 GB to 999 GB") },
                                        { name: "500 GB to 749 GB", color: "#F28E2B", f: fsv("500 GB to 749 GB"), t: tsv("500 GB to 749 GB") },
                                        { name: "250 GB to 499 GB", color: "#59A14F", f: fsv("250 GB to 499 GB"), t: tsv("250 GB to 499 GB") },
                                        { name: "100 GB to 249 GB", color: "#76B7B2", f: fsv("100 GB to 249 GB"), t: tsv("100 GB to 249 GB") },
                                        { name: "10 GB to 99 GB", color: "#B07AA1", f: fsv("10 GB to 99 GB"), t: tsv("10 GB to 99 GB") },
                                        { name: "< 10 GB", color: "#C4933F", f: fsv("Less than 10 GB"), t: tsv("Less than 10 GB") }
                                ];
                                const dv = TIER_D.map(td => tHd.dates.map((_, i) => +(td.f[i] - td.t[i]).toFixed(2)));
                                const chips = TIER_D.map((td, ti) => {
                                        const vals = dv[ti], first = vals[0], last = vals[vals.length - 1];
                                        const chg = +(last - first).toFixed(2);
                                        const isWorsen = (last < 0 && chg < 0) || (last >= 0 && chg > 0);
                                        const chgColor = isWorsen ? "var(--red)" : "#1AAB4A";
                                        return `<div style="background:var(--white);border:1px solid var(--line);border-top:2px solid ${td.color};border-radius:4px;padding:5px 8px;flex:1;min-width:88px;"><div style="font-size:9.5px;color:var(--ink60);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${td.name}</div><div style="font-size:1rem;font-weight:700;color:${td.color};line-height:1.2;">${last >= 0 ? '+' : ''}${last}</div><div style="font-size:9px;color:${chgColor};">${chg >= 0 ? '▲' : '▼'} ${Math.abs(chg).toFixed(2)}</div></div>`;
                                }).join("");
                                const makeCard = (td, ti) => {
                                        const svg = drawDivChart(tHd.dates, dv[ti], td.color, 200, 118);
                                        return `<div class="div-tip-wrap" style="position:relative;background:var(--white);border:1px solid var(--line);border-top:2px solid ${td.color};border-radius:6px;padding:8px 10px;"><div style="font-size:10.5px;font-weight:600;color:${td.color};margin-bottom:5px;">${td.name}</div>${svg}<div class="div-tip" hidden></div></div>`;
                                };
                                const allCardsHtml = TIER_D.map((td, i) => makeCard(td, i)).join("");
                                S.push(slide("p_divtier", `
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;">${allCardsHtml}</div>
      `, "p_divtier_ins", t("p_divtier_sub")));
                        }

                        // Slide 8: Appendix divider
                        S.push(slide("ap", `
        <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:80%; text-align:center; padding-top:30px;">
          <h1 style="font-size:64px; color:var(--red); font-weight:800; margin-bottom:12px; font-family:'Outfit',sans-serif; letter-spacing:0.05em;">APPENDIX</h1>
          <div style="width:80px; height:4px; background:var(--red); margin-bottom:24px;"></div>
          <h2 style="font-size:24px; color:var(--black); font-weight:700; margin-bottom:16px;">${t("ap_div_t")}</h2>
          <p style="font-size:15px; color:var(--ink60); max-width:550px; line-height:1.6;">${t("ap_div_p")}</p>
        </div>
      `));

                        // Slide 9: Appendix A - VRAM Trend
                        S.push(slide("ap_vram", `
        <div class="chart-container" style="grid-template-columns: 1fr;">
          <div>${drawLineChart(D.vramTrend, 0, 45, 1000, true, 440, 4)}</div>
        </div>
      `, "ap_vram_ins"));

                        // Slide 10: Appendix B - Display Resolution Trend
                        S.push(slide("ap_disp", `
        <div class="chart-container" style="grid-template-columns: 1fr;">
          <div>${drawLineChart(D.displayTrend, 0, 60, 1000, true, 440, 4)}</div>
        </div>
      `, "ap_disp_ins"));

                        // Slide 11: Appendix C - Total HD Space Trend
                        S.push(slide("ap_total", `
        <div class="chart-container" style="grid-template-columns: 1fr;">
          <div>${drawLineChart(D.totalHdTrend, 0, 75, 1000, true, 440, 4)}</div>
        </div>
      `, "ap_total_ins"));

                        // Slide 12: Appendix D - Free HD Space Trend
                        S.push(slide("ap_free", `
        <div class="chart-container" style="grid-template-columns: 1fr;">
          <div>${drawLineChart(D.freeHdTrend, 0, 30, 1000, true, 440, 4)}</div>
        </div>
      `, "ap_free_ins"));

                        return S;
                }

                /* =========================================================
                   Mount & Wire Logic
                ========================================================= */
                function render() {
                        document.body.dataset.lang = LANG;
                        const arr = buildSlides();
                        const deck = document.getElementById("deck");
                        deck.innerHTML = arr.join("");

                        // number the slides (skip cover)
                        const secs = deck.querySelectorAll(".slide");
                        secs.forEach((s, i) => {
                                if (i > 0) s.dataset.no = String(i) + " / " + (secs.length - 1);
                                s.id = "sl" + i;
                        });

                        // sidenav dots
                        const nav = document.getElementById("sidenav");
                        nav.innerHTML = Array.from(secs).map((s, i) => `<a href="#sl${i}" id="dot-sl${i}" title="Slide ${i}"></a>`).join("");

                        wireTooltipEvents();
                        wireDivTooltipEvents();
                        wireLegendHighlight();
                        wireGpuFilterEvents();
                        wireScrollHighlight();
                        renderNormChart();
                        if (window.attachFsButtons) window.attachFsButtons();
                }

                // Legend click -> highlight line(s). Multi-select: click toggles, multiple stay active.
                // A "⟲ Show all" chip appears whenever anything is selected, to reset in one click.
                function wireLegendHighlight() {
                        document.querySelectorAll(".lc-wrap").forEach(wrap => {
                                const legs = wrap.querySelectorAll(".lc-leg");
                                if (!legs.length) return;
                                const resetChip = wrap.querySelector(".lc-reset");

                                function apply() {
                                        const svg = wrap.querySelector("svg");
                                        const active = new Set([...wrap.querySelectorAll(".lc-leg.on")].map(s => s.dataset.si));
                                        const els = svg.querySelectorAll("[data-si]");
                                        if (resetChip) resetChip.hidden = active.size === 0;
                                        if (active.size === 0) {
                                                els.forEach(el => {
                                                        el.style.opacity = "";
                                                        if (el.classList.contains("lc-line")) el.style.strokeWidth = "";
                                                });
                                                legs.forEach(s => s.style.opacity = "");
                                                return;
                                        }
                                        els.forEach(el => {
                                                if (el.classList.contains("lc-hit")) return; // keep hover hit-areas live
                                                const on = active.has(el.dataset.si);
                                                el.style.opacity = on ? "1" : "0.08";
                                                // active line gets thicker; others keep their base width (thin for non-top)
                                                if (el.classList.contains("lc-line")) el.style.strokeWidth = on ? "3.5" : "";
                                        });
                                        legs.forEach(s => s.style.opacity = active.has(s.dataset.si) ? "1" : "0.35");
                                }

                                legs.forEach(span => {
                                        span.addEventListener("click", () => {
                                                span.classList.toggle("on");
                                                apply();
                                        });
                                });

                                if (resetChip) {
                                        resetChip.addEventListener("click", () => {
                                                legs.forEach(s => s.classList.remove("on"));
                                                apply();
                                        });
                                }
                        });
                }

                // Div-chart card tooltip
                function wireDivTooltipEvents() {
                        const MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                        document.querySelectorAll(".div-tip-wrap").forEach(wrap => {
                                const tip = wrap.querySelector(".div-tip");
                                if (!tip) return;
                                wrap.addEventListener("mousemove", e => {
                                        const hit = e.target.closest(".div-hit");
                                        if (!hit) { tip.hidden = true; return; }
                                        const r = wrap.getBoundingClientRect();
                                        const v = parseFloat(hit.dataset.v);
                                        const sign = v >= 0 ? "+" : "";
                                        const anom = hit.dataset.anom === "1";
                                        const m = /^(\d{4})-(\d{2})$/.exec(hit.dataset.d);
                                        const dLabel = m ? `${MONTHS[parseInt(m[2], 10) - 1]}'${m[1].slice(2)}` : hit.dataset.d;
                                        tip.innerHTML = `${dLabel} | <b style="color:${hit.dataset.c}">${sign}${v}</b>${anom ? ' <span style="color:#F0A500">⚠</span>' : ''}`;
                                        tip.style.left = (e.clientX - r.left) + "px";
                                        tip.style.top = (e.clientY - r.top) + "px";
                                        tip.hidden = false;
                                });
                                wrap.addEventListener("mouseleave", () => { tip.hidden = true; });
                        });
                }

                // Line chart hover tooltip
                function wireTooltipEvents() {
                        const MONTHS_EN = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                        document.querySelectorAll(".lc-wrap").forEach(wrap => {
                                const tip = wrap.querySelector(".lc-tip");
                                if (!tip) return;
                                wrap.addEventListener("mousemove", e => {
                                        const hit = e.target.closest(".lc-hit");
                                        if (!hit) {
                                                tip.hidden = true;
                                                return;
                                        }
                                        const r = wrap.getBoundingClientRect();
                                        const dStr = hit.dataset.d;
                                        let tooltipDate = dStr;
                                        const m2 = /^(\d{4})-(\d{2})$/.exec(dStr);  // YYYY-MM => "Mon YYYY"; else use as-is (e.g. "Month 3")
                                        if (m2) tooltipDate = `${MONTHS_EN[parseInt(m2[2], 10) - 1]} ${m2[1]}`;

                                        tip.innerHTML = `<span class="tn" style="color:${hit.dataset.c}">${hit.dataset.n}</span> · ${tooltipDate} · 市佔率: <b>${hit.dataset.v}</b>`;
                                        tip.style.left = (e.clientX - r.left) + "px";
                                        tip.style.top = (e.clientY - r.top) + "px";
                                        tip.hidden = false;
                                });
                                wrap.addEventListener("mouseleave", () => {
                                        tip.hidden = true;
                                });
                        });
                }

                // Filter GPU table based on selected tab
                function wireGpuFilterEvents() {
                        const container = document.getElementById("gpu-table-container");
                        if (!container) return;

                        const tabBtns = document.querySelectorAll(".gpu-filter-tabs .tab-btn");
                        tabBtns.forEach(btn => {
                                btn.addEventListener("click", () => {
                                        tabBtns.forEach(b => b.classList.remove("active"));
                                        btn.classList.add("active");

                                        const filter = btn.dataset.filter;
                                        let filtered = D.gpus;
                                        if (filter !== "Overall") {
                                                filtered = D.gpus.filter(g => g.series === filter);
                                        }

                                        const filteredRows = filtered.map(g => {
                                                const isHighlight = ["GeForce RTX 3060", "GeForce RTX 4060", "GeForce RTX 5070"].includes(g.name);
                                                const nameHtml = isHighlight ? `<span class="win">${g.name}</span>` : g.name;
                                                const shHtml = isHighlight ? `<span class="win">${g.m5.toFixed(2)}%</span>` : `${g.m5.toFixed(2)}%`;
                                                const m4Html = g.m4 === 0 ? `<span style="color:var(--gray6)">-</span>` : `${g.m4.toFixed(2)}%`;
                                                return [
                                                        nameHtml,
                                                        g.series,
                                                        `${g.m3.toFixed(2)}%`,
                                                        m4Html,
                                                        shHtml,
                                                        fmtChange(g.mom),
                                                        fmtChange(g.rolling3m)
                                                ];
                                        });

                                        container.innerHTML = renderTable(
                                                [t("th_gpu"), t("th_series"), t("th_m3"), t("th_m4"), t("th_m5"), t("th_change"), t("th_roll")],
                                                filteredRows
                                        );
                                });
                        });
                }

                // Highlight sidenav dots on scroll
                function wireScrollHighlight() {
                        const secs = document.querySelectorAll(".slide");
                        const dots = document.querySelectorAll(".sidenav a");

                        function onScroll() {
                                let activeId = "";
                                const scrollPos = window.scrollY + 150;
                                secs.forEach(s => {
                                        if (scrollPos >= s.offsetTop) {
                                                activeId = s.id;
                                        }
                                });

                                dots.forEach(d => {
                                        d.classList.toggle("on", d.id === "dot-" + activeId);
                                });
                        }

                        window.addEventListener("scroll", onScroll);
                        // Run once at load
                        onScroll();
                }

                render();
        </script>
</body>

</html>
